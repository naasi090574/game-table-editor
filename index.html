<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редактор «Морской бой»</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      color: #ffffff;
      background:
        radial-gradient(circle at top left, rgba(0, 217, 255, 0.24), transparent 35%),
        radial-gradient(circle at bottom right, rgba(137, 74, 255, 0.22), transparent 35%),
        #071426;
    }

    .editor-app {
      display: grid;
      grid-template-columns: 430px 1fr;
      gap: 22px;
      padding: 22px;
      min-height: 100vh;
    }

    .editor-panel,
    .preview-panel {
      border: 2px solid #13d8ff;
      border-radius: 24px;
      background: rgba(14, 31, 51, 0.94);
      box-shadow:
        0 0 24px rgba(19, 216, 255, 0.25),
        inset 0 0 25px rgba(255, 255, 255, 0.04);
    }

    .editor-panel {
      padding: 20px;
      max-height: calc(100vh - 44px);
      overflow-y: auto;
    }

    .preview-panel {
      padding: 18px;
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 44px);
    }

    .top-title {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .round-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(145deg, #34f1ff, #03a9d7);
      box-shadow:
        inset 0 8px 14px rgba(255,255,255,.35),
        inset 0 -12px 22px rgba(0,0,0,.22),
        0 0 24px rgba(19,216,255,.65);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      color: #18dfff;
      font-size: 25px;
      line-height: 1.15;
      text-shadow: 0 0 12px rgba(24, 223, 255, 0.72);
    }

    .section {
      padding: 17px 0;
      border-top: 1px solid rgba(255,255,255,.12);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: 800;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(19, 216, 255, 0.32);
      border-radius: 13px;
      background: rgba(255,255,255,.07);
      color: #ffffff;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      font-family: inherit;
    }

    select option {
      color: #111111;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #13d8ff;
      box-shadow: 0 0 15px rgba(19,216,255,.3);
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checkbox-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      padding: 11px 12px;
      border-radius: 13px;
      background: rgba(255,255,255,.06);
      font-weight: 800;
    }

    .checkbox-line input {
      width: 23px;
      height: 23px;
      accent-color: #13d8ff;
    }

    .hint {
      margin-top: 7px;
      font-size: 13px;
      line-height: 1.35;
      color: rgba(255,255,255,.68);
    }

    .big-btn {
      width: 100%;
      border: none;
      border-radius: 17px;
      padding: 17px 18px;
      cursor: pointer;
      color: #03111d;
      font-size: 17px;
      font-weight: 900;
      background: linear-gradient(145deg, #2cecff, #04bce8);
      box-shadow:
        0 9px 0 #057fa3,
        0 0 28px rgba(19,216,255,.45),
        inset 0 4px 5px rgba(255,255,255,.35);
    }

    .big-btn:active {
      transform: translateY(5px);
      box-shadow:
        0 4px 0 #057fa3,
        0 0 16px rgba(19,216,255,.35);
    }

    .small-btn {
      width: 100%;
      border: 2px solid #13d8ff;
      border-radius: 12px;
      padding: 11px;
      cursor: pointer;
      background: transparent;
      color: #ffffff;
      font-weight: 900;
    }

    .message {
      min-height: 24px;
      margin-top: 12px;
      color: #91f4ff;
      font-weight: 800;
      line-height: 1.35;
    }

    #manualCopyBlock {
      display: none;
      margin-top: 12px;
    }

    #manualCode {
      min-height: 120px;
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.35;
    }

    .preview-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
    }

    .preview-tab {
      flex: 1;
      border: 2px solid #13d8ff;
      border-radius: 12px;
      padding: 13px;
      background: transparent;
      color: #ffffff;
      font-weight: 900;
      cursor: pointer;
    }

    .preview-tab.active {
      color: #06131c;
      background: linear-gradient(145deg, #2cecff, #04bce8);
      box-shadow: 0 0 18px rgba(19,216,255,.4);
    }

    #preview {
      flex: 1;
      min-height: 560px;
      overflow: hidden;
      border-radius: 20px;
      background: transparent;
    }

    @media (max-width: 1000px) {
      .editor-app {
        grid-template-columns: 1fr;
      }

      .editor-panel {
        max-height: none;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    function base64UrlEncode(str) {
      return btoa(unescape(encodeURIComponent(str)))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=+$/g, "");
    }

    function base64UrlDecode(str) {
      str = str.replace(/-/g, "+").replace(/_/g, "/");
      while (str.length % 4) {
        str += "=";
      }
      return decodeURIComponent(escape(atob(str)));
    }

    function encodeConfig(config) {
      return base64UrlEncode(JSON.stringify(config));
    }

    function decodeConfig(text) {
      return JSON.parse(base64UrlDecode(text));
    }

    function getGameParam() {
      const params = new URLSearchParams(window.location.search);
      return params.get("game") || "";
    }

    const defaultConfig = {
      gameTitle: "МОРСКОЙ БОЙ",
      gameRules: "Нажимай на клетки.\nНазови то, что сверху, и то, что слева.\nНайди все спрятанные объекты!",
      gameMode: "single",
      fontFamily: "Arial, sans-serif",
      themeColor: "#13d8ff",
      textColor: "#ffffff",
      cellColor: "#4a4a4a",
      textNeon: true,
      frameNeon: true,
      soundButton: true,
      showDarkCard: true,
      topItems: ["руль", "рогатка", "рак", "ракета"],
      leftItems: ["ручка", "ракушка", "робот", "ромашка"],
      objectUrl: "",
      objectCount: 5,
      objectCoords: ["1,2", "2,1", "2,3", "3,4", "4,2"],
      winText: "Победа! Все объекты найдены!",
      feedbackUrl: "",
      endButtonText: "ИГРАТЬ СНОВА",
      showEndButton: true,
      transparentBg: true,
      bgColor: "#000000",
      bgUrl: "",
      bgBlur: 0
    };

    const gameParam = getGameParam();

    if (gameParam) {
      try {
        const config = decodeConfig(gameParam);
        document.body.style.margin = "0";
        document.body.style.background = "transparent";
        document.getElementById("app").style.width = "100vw";
        document.getElementById("app").style.height = "100vh";
        renderGame("app", config, false);
      } catch (error) {
        document.getElementById("app").innerHTML =
          "<div style='padding:30px;color:white;background:#08142a;font-family:Arial;'>Не удалось открыть игру. Проверьте код вставки.</div>";
      }
    } else {
      renderEditor();
    }

    function renderEditor() {
      document.getElementById("app").innerHTML = `
        <div class="editor-app">
          <aside class="editor-panel">
            <div class="top-title">
              <div class="round-logo"></div>
              <h1>Редактор<br>«Морской бой»</h1>
            </div>

            <div class="section">
              <label>Заголовок игры:</label>
              <input id="gameTitle" value="${defaultConfig.gameTitle}">

              <br><br>

              <label>Правила игры:</label>
              <textarea id="gameRules">${defaultConfig.gameRules}</textarea>
            </div>

            <div class="section">
              <label>Вид игры:</label>
              <select id="gameMode">
                <option value="single">Индивидуальный</option>
                <option value="team">Командный</option>
              </select>
            </div>

            <div class="section">
              <label>Шрифт текста:</label>
              <select id="fontFamily">
                <option value="Arial, sans-serif">Arial</option>
                <option value="'PT Sans', Arial, sans-serif">PT Sans</option>
                <option value="Montserrat, Arial, sans-serif">Montserrat</option>
                <option value="'Open Sans', Arial, sans-serif">Open Sans</option>
                <option value="Rubik, Arial, sans-serif">Rubik</option>
                <option value="'Comic Sans MS', cursive">Comic Sans</option>
                <option value="Georgia, serif">Georgia</option>
              </select>

              <br><br>

              <div class="two">
                <div>
                  <label>Цвет темы:</label>
                  <input id="themeColor" type="color" value="${defaultConfig.themeColor}">
                </div>

                <div>
                  <label>Цвет текста:</label>
                  <input id="textColor" type="color" value="${defaultConfig.textColor}">
                </div>
              </div>

              <br>

              <label>Цвет кнопок-клеток:</label>
              <input id="cellColor" type="color" value="${defaultConfig.cellColor}">

              <label class="checkbox-line">
                <input id="textNeon" type="checkbox" checked>
                Неон текста
              </label>

              <label class="checkbox-line">
                <input id="frameNeon" type="checkbox" checked>
                Неон рамок и клеток
              </label>

              <label class="checkbox-line">
                <input id="soundButton" type="checkbox" checked>
                Кнопка звука в игре
              </label>

              <label class="checkbox-line">
                <input id="showDarkCard" type="checkbox" checked>
                Показывать тёмную карточку игры
              </label>
            </div>

            <div class="section">
              <label>Слова или URL картинок сверху<br>каждый с новой строки:</label>
              <textarea id="topItems">${defaultConfig.topItems.join("\n")}</textarea>

              <br><br>

              <label>Слова или URL картинок слева<br>каждый с новой строки:</label>
              <textarea id="leftItems">${defaultConfig.leftItems.join("\n")}</textarea>
            </div>

            <div class="section">
              <label>URL картинки спрятанного объекта:</label>
              <input id="objectUrl" placeholder="Можно оставить пустым — будет звёздочка">

              <br><br>

              <label>Количество объектов, если координаты пустые:</label>
              <input id="objectCount" type="number" min="1" value="${defaultConfig.objectCount}">

              <br><br>

              <label>Координаты клеток с объектами<br>каждая с новой строки:</label>
              <textarea id="objectCoords">${defaultConfig.objectCoords.join("\n")}</textarea>
              <div class="hint">Первое число — строка, второе — столбец. Например: 2,3</div>
            </div>

            <div class="section">
              <label>Текст при победе:</label>
              <input id="winText" value="${defaultConfig.winText}">

              <br><br>

              <label>URL картинки фидбэка при победе:</label>
              <input id="feedbackUrl" placeholder="Можно оставить пустым">

              <br><br>

              <label>Текст кнопки в конце:</label>
              <input id="endButtonText" value="${defaultConfig.endButtonText}">

              <label class="checkbox-line">
                <input id="showEndButton" type="checkbox" checked>
                Показывать кнопку в конце
              </label>
            </div>

            <div class="section">
              <label class="checkbox-line">
                <input id="transparentBg" type="checkbox" checked>
                Полностью прозрачный фон
              </label>

              <div class="two">
                <div>
                  <label>Цвет фона:</label>
                  <input id="bgColor" type="color" value="${defaultConfig.bgColor}">
                </div>

                <div>
                  <label>&nbsp;</label>
                  <button class="small-btn" type="button" onclick="resetBackground()">Сброс</button>
                </div>
              </div>

              <br>

              <label>URL картинки фона:</label>
              <input id="bgUrl" placeholder="https://...">

              <br><br>

              <label>Размытие фона:</label>
              <input id="bgBlur" type="range" min="0" max="20" value="0">
            </div>

            <button class="big-btn" type="button" onclick="copyShortCode()">СКОПИРОВАТЬ КОРОТКИЙ КОД ДЛЯ GENIALLY</button>
            <div class="message" id="message"></div>

            <div id="manualCopyBlock">
              <label>Короткий код для ручного копирования:</label>
              <textarea id="manualCode" readonly></textarea>
              <div class="hint">Если автоматическое копирование не сработало, выдели этот код и скопируй вручную.</div>
            </div>
          </aside>

          <main class="preview-panel">
            <div class="preview-tabs">
              <button class="preview-tab active" type="button">ПРЕДПРОСМОТР ИГРЫ</button>
              <button class="preview-tab" type="button" onclick="copyShortCode()">СКОПИРОВАТЬ КОД</button>
            </div>

            <div id="preview"></div>
          </main>
        </div>
      `;

      document.getElementById("gameMode").value = defaultConfig.gameMode;
      document.getElementById("fontFamily").value = defaultConfig.fontFamily;

      const fieldIds = [
        "gameTitle",
        "gameRules",
        "gameMode",
        "fontFamily",
        "themeColor",
        "textColor",
        "cellColor",
        "textNeon",
        "frameNeon",
        "soundButton",
        "showDarkCard",
        "topItems",
        "leftItems",
        "objectUrl",
        "objectCount",
        "objectCoords",
        "winText",
        "feedbackUrl",
        "endButtonText",
        "showEndButton",
        "transparentBg",
        "bgColor",
        "bgUrl",
        "bgBlur"
      ];

      fieldIds.forEach(function(id) {
        const element = document.getElementById(id);
        element.addEventListener("input", updatePreview);
        element.addEventListener("change", updatePreview);
      });

      updatePreview();
    }

    function linesFromText(value) {
      return String(value)
        .split("\n")
        .map(function(line) {
          return line.trim();
        })
        .filter(Boolean);
    }

    function getConfig() {
      return {
        gameTitle: document.getElementById("gameTitle").value.trim() || "МОРСКОЙ БОЙ",
        gameRules: document.getElementById("gameRules").value.trim(),
        gameMode: document.getElementById("gameMode").value,
        fontFamily: document.getElementById("fontFamily").value,
        themeColor: document.getElementById("themeColor").value,
        textColor: document.getElementById("textColor").value,
        cellColor: document.getElementById("cellColor").value,
        textNeon: document.getElementById("textNeon").checked,
        frameNeon: document.getElementById("frameNeon").checked,
        soundButton: document.getElementById("soundButton").checked,
        showDarkCard: document.getElementById("showDarkCard").checked,
        topItems: linesFromText(document.getElementById("topItems").value),
        leftItems: linesFromText(document.getElementById("leftItems").value),
        objectUrl: document.getElementById("objectUrl").value.trim(),
        objectCount: Number(document.getElementById("objectCount").value) || 1,
        objectCoords: linesFromText(document.getElementById("objectCoords").value),
        winText: document.getElementById("winText").value.trim() || "Победа!",
        feedbackUrl: document.getElementById("feedbackUrl").value.trim(),
        endButtonText: document.getElementById("endButtonText").value.trim() || "ИГРАТЬ СНОВА",
        showEndButton: document.getElementById("showEndButton").checked,
        transparentBg: document.getElementById("transparentBg").checked,
        bgColor: document.getElementById("bgColor").value,
        bgUrl: document.getElementById("bgUrl").value.trim(),
        bgBlur: Number(document.getElementById("bgBlur").value) || 0
      };
    }

    function resetBackground() {
      document.getElementById("bgColor").value = "#000000";
      document.getElementById("bgUrl").value = "";
      document.getElementById("bgBlur").value = "0";
      updatePreview();
    }

    function updatePreview() {
      const config = getConfig();
      const preview = document.getElementById("preview");
      if (preview) {
        preview.style.background = config.transparentBg ? "transparent" : "#000000";
      }
      renderGame("preview", config, true);
    }

    function createShortIframeCode() {
      const config = getConfig();
      const encoded = encodeConfig(config);
      const baseUrl = window.location.origin + window.location.pathname;
      const gameUrl = baseUrl + "?game=" + encoded;

      return `<iframe
  src="${gameUrl}"
  style="width: 100%; height: 100%; border: none; overflow: hidden;"
  frameborder="0"
  allowfullscreen>
</iframe>`;
    }

    function copyShortCode() {
      const code = createShortIframeCode();
      const message = document.getElementById("message");
      const manualBlock = document.getElementById("manualCopyBlock");
      const manualCode = document.getElementById("manualCode");

      manualCode.value = code;

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(code)
          .then(function() {
            message.textContent = "Готово! Короткий код игры скопирован.";
            manualBlock.style.display = "none";
          })
          .catch(function() {
            message.textContent = "Браузер не разрешил автокопирование. Код появился ниже — скопируй его вручную.";
            manualBlock.style.display = "block";
            manualCode.focus();
            manualCode.select();
          });
      } else {
        message.textContent = "Код появился ниже — скопируй его вручную.";
        manualBlock.style.display = "block";
        manualCode.focus();
        manualCode.select();
      }
    }

    function renderGame(targetId, config, previewMode) {
      const root = document.getElementById(targetId);
      if (!root) return;

      const isUrl = function(value) {
        return /^https?:\/\//i.test(String(value));
      };

      const safe = function(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      };

      const topItems = Array.isArray(config.topItems) && config.topItems.length ? config.topItems : ["1", "2", "3", "4"];
      const leftItems = Array.isArray(config.leftItems) && config.leftItems.length ? config.leftItems : ["1", "2", "3", "4"];

      const rows = leftItems.length;
      const cols = topItems.length;

      const theme = config.themeColor || "#13d8ff";
      const textColor = config.textColor || "#ffffff";
      const cellColor = config.cellColor || "#4a4a4a";
      const fontFamily = config.fontFamily || "Arial, sans-serif";

      let soundOn = true;
      let found = 0;
      const foundCells = new Set();

      function parseHiddenCells() {
        const result = new Set();

        if (Array.isArray(config.objectCoords)) {
          config.objectCoords.forEach(function(line) {
            const parts = String(line).split(",");
            const row = Number(parts[0]);
            const col = Number(parts[1]);

            if (row >= 1 && row <= rows && col >= 1 && col <= cols) {
              result.add((row - 1) + "-" + (col - 1));
            }
          });
        }

        if (result.size === 0) {
          const allCells = [];

          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              allCells.push(r + "-" + c);
            }
          }

          for (let i = allCells.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const temp = allCells[i];
            allCells[i] = allCells[j];
            allCells[j] = temp;
          }

          const need = Math.min(Number(config.objectCount) || 1, allCells.length);
          allCells.slice(0, need).forEach(function(cell) {
            result.add(cell);
          });
        }

        return result;
      }

      const hiddenCells = parseHiddenCells();
      const totalObjects = hiddenCells.size;

      function makeItem(value, className, index) {
        const content = isUrl(value)
          ? `<img src="${safe(value)}" alt="">`
          : `<span>${safe(value)}</span>`;

        return `<div class="${className}" data-index="${index}">${content}</div>`;
      }

      function playClickSound() {
        if (!soundOn) return;

        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.type = "sine";
          osc.frequency.value = 620;
          gain.gain.value = 0.04;

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.start();
          osc.stop(ctx.currentTime + 0.08);
        } catch (error) {}
      }

      function playWinSound() {
        if (!soundOn) return;

        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          const ctx = new AudioContext();

          [523, 659, 784].forEach(function(freq, index) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.frequency.value = freq;
            gain.gain.value = 0.045;

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start(ctx.currentTime + index * 0.12);
            osc.stop(ctx.currentTime + index * 0.12 + 0.12);
          });
        } catch (error) {}
      }

      const bgStyle = config.transparentBg
        ? "background: transparent;"
        : config.bgUrl
          ? `background-image: url('${safe(config.bgUrl)}'); background-size: cover; background-position: center;`
          : `background: ${safe(config.bgColor || "#000000")};`;

      const textNeon = config.textNeon
        ? `text-shadow: 0 0 10px ${theme}, 0 0 22px ${theme};`
        : "";

      const frameNeon = config.frameNeon
        ? `box-shadow: 0 0 18px ${theme}77, inset 0 0 18px rgba(255,255,255,.04);`
        : "";

      const cardBg = config.showDarkCard
        ? "rgba(0,0,0,.72)"
        : "transparent";

      const cardBorder = config.showDarkCard
        ? `2px solid ${theme}`
        : "2px solid transparent";

      root.innerHTML = `
        <style>
          #${targetId} {
            width: 100%;
            height: 100%;
            overflow: hidden;
            color: ${textColor};
            font-family: ${fontFamily};
            background: transparent !important;
          }

          #${targetId} * {
            box-sizing: border-box;
          }

          #${targetId} .game-main {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(6px, 1.2vmin, 14px);
            ${bgStyle}
          }

          #${targetId} .blur-layer {
            position: absolute;
            inset: 0;
            backdrop-filter: blur(${Number(config.bgBlur) || 0}px);
            pointer-events: none;
          }

          #${targetId} .game-card {
            position: relative;
            width: 100%;
            height: 100%;
            border: ${cardBorder};
            border-radius: 24px;
            padding: clamp(10px, 2vmin, 20px);
            background: ${cardBg};
            ${config.showDarkCard ? frameNeon : ""}
            overflow: hidden;
          }

          #${targetId} .start-screen {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(12px, 3vmin, 24px);
            text-align: center;
          }

          #${targetId} .play-screen {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: none;
            grid-template-rows: auto auto auto minmax(0, 1fr);
            overflow: hidden;
          }

          #${targetId} .main-title {
            margin: 0;
            text-align: center;
            color: ${theme};
            font-size: clamp(28px, 6vmin, 54px);
            font-weight: 900;
            letter-spacing: .03em;
            ${textNeon}
          }

          #${targetId} .rules {
            max-width: 720px;
            margin: 0 auto;
            font-size: clamp(17px, 3vmin, 26px);
            line-height: 1.45;
            white-space: pre-line;
            text-align: left;
          }

          #${targetId} .rules div {
            margin: 7px 0;
          }

          #${targetId} .game-btn {
            display: block;
            margin: 0 auto;
            border: none;
            border-radius: 17px;
            padding: 13px 42px;
            cursor: pointer;
            color: #03111d;
            font-size: clamp(20px, 3.5vmin, 27px);
            font-weight: 900;
            background: linear-gradient(145deg, ${theme}, #02aaca);
            box-shadow:
              0 8px 0 rgba(0,0,0,.38),
              0 0 24px ${theme}88,
              inset 0 4px 5px rgba(255,255,255,.38);
          }

          #${targetId} .game-btn:active {
            transform: translateY(5px);
            box-shadow:
              0 3px 0 rgba(0,0,0,.38),
              0 0 14px ${theme}66,
              inset 0 2px 5px rgba(255,255,255,.3);
          }

          #${targetId} .turn-title {
            margin: 0;
            text-align: center;
            color: ${theme};
            font-size: clamp(20px, 4.5vmin, 38px);
            font-weight: 900;
            line-height: 1.05;
            ${textNeon}
          }

          #${targetId} .counter {
            margin: clamp(4px, 1vmin, 8px) 0;
            text-align: center;
            font-size: clamp(18px, 3.5vmin, 30px);
            font-weight: 900;
            line-height: 1.1;
          }

          #${targetId} .progress {
            width: min(520px, 72%);
            height: clamp(12px, 2.2vmin, 20px);
            margin: 0 auto clamp(8px, 1.5vmin, 14px);
            border: 2px solid ${theme};
            border-radius: 999px;
            background: rgba(255,255,255,.08);
            overflow: hidden;
            ${frameNeon}
          }

          #${targetId} .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, ${theme}, #ffffff);
            box-shadow: 0 0 18px ${theme};
            transition: width .25s;
          }

          #${targetId} .team-box {
            display: ${config.gameMode === "team" ? "flex" : "none"};
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: clamp(6px, 1vmin, 10px);
          }

          #${targetId} .team-box input {
            width: 170px;
            border: 2px solid ${theme};
            border-radius: 13px;
            background: rgba(255,255,255,.08);
            color: ${textColor};
            padding: 8px 10px;
            font-size: 15px;
            outline: none;
          }

          #${targetId} .play-layout {
            min-height: 0;
            height: 100%;
            display: grid;
            grid-template-columns: minmax(110px, 150px) minmax(0, 1fr);
            gap: clamp(8px, 1.5vmin, 16px);
            align-items: center;
            overflow: hidden;
          }

          #${targetId} .found-panel {
            width: 100%;
            max-height: 100%;
            border-radius: 18px;
            border: 2px solid ${theme};
            background: rgba(255,255,255,.06);
            padding: clamp(8px, 1.2vmin, 12px);
            overflow: hidden;
            ${frameNeon}
          }

          #${targetId} .found-panel-title {
            font-size: clamp(15px, 2.4vmin, 22px);
            font-weight: 900;
            text-align: center;
            color: ${theme};
            margin-bottom: 8px;
            ${textNeon}
          }

          #${targetId} .found-items {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: calc(100% - 34px);
            overflow: hidden;
          }

          #${targetId} .found-empty {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(255,255,255,.72);
            font-size: 13px;
            line-height: 1.3;
            padding: 14px 4px;
          }

          #${targetId} .found-item {
            aspect-ratio: 1 / 1;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,.16);
            background:
              radial-gradient(circle at top left, rgba(255,255,255,.18), transparent 38%),
              linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.025)),
              ${cellColor};
            box-shadow:
              0 6px 0 rgba(0,0,0,.35),
              inset 0 3px 5px rgba(255,255,255,.2),
              inset 0 -8px 14px rgba(0,0,0,.28),
              0 0 18px ${theme}55;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
          }

          #${targetId} .found-item img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
          }

          #${targetId} .found-item span {
            font-size: 28px;
          }

          #${targetId} .board-wrap {
            min-width: 0;
            min-height: 0;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
          }

          #${targetId} .board {
            --cell: min(
              78px,
              calc((100vh - 185px) / ${rows + 1}),
              calc((100vw - 230px) / ${cols + 2})
            );
            display: grid;
            grid-template-columns: calc(var(--cell) * 1.18) repeat(${cols}, var(--cell));
            grid-template-rows: var(--cell) repeat(${rows}, var(--cell));
            gap: clamp(5px, 1vmin, 10px);
            justify-content: center;
            align-content: center;
            max-width: 100%;
            max-height: 100%;
          }

          #${targetId} .corner {
            border-radius: 16px;
          }

          #${targetId} .head-item,
          #${targetId} .left-item,
          #${targetId} .cell {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: clamp(10px, 2vmin, 18px);
            border: 1px solid rgba(255,255,255,.16);
            padding: clamp(3px, .8vmin, 8px);
            background:
              radial-gradient(circle at top left, rgba(255,255,255,.20), transparent 38%),
              linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.025)),
              ${cellColor};
            box-shadow:
              0 8px 0 rgba(0,0,0,.38),
              inset 0 3px 5px rgba(255,255,255,.22),
              inset 0 -8px 14px rgba(0,0,0,.32);
            transition: transform .14s, box-shadow .14s, background .14s, border-color .14s, opacity .18s;
          }

          #${targetId} .cell {
            cursor: pointer;
          }

          #${targetId} .cell:hover {
            transform: translateY(-2px);
          }

          #${targetId} .cell:active {
            transform: translateY(5px);
            box-shadow:
              0 3px 0 rgba(0,0,0,.38),
              inset 0 2px 8px rgba(0,0,0,.38);
          }

          #${targetId} .head-item.active,
          #${targetId} .left-item.active,
          #${targetId} .cell.active {
            border-color: ${theme};
            background:
              radial-gradient(circle at top, rgba(255,255,255,.36), transparent 35%),
              linear-gradient(145deg, ${theme}, #05a9cc);
            color: #04131d;
            box-shadow:
              0 8px 0 rgba(0,0,0,.38),
              0 0 25px ${theme}aa,
              inset 0 4px 7px rgba(255,255,255,.42);
          }

          #${targetId} .cell.vanished {
            opacity: 0.08;
            pointer-events: none;
            background: transparent;
            border-color: transparent;
            box-shadow: none;
            transform: scale(.75);
          }

          #${targetId} .cell.found {
            border-color: ${theme};
            background:
              radial-gradient(circle at top, rgba(255,255,255,.34), transparent 35%),
              linear-gradient(145deg, ${theme}, #05a9cc);
            box-shadow:
              0 8px 0 rgba(0,0,0,.38),
              0 0 25px ${theme}aa,
              inset 0 4px 7px rgba(255,255,255,.42);
          }

          #${targetId} .head-item img,
          #${targetId} .left-item img,
          #${targetId} .cell img {
            max-width: 88%;
            max-height: 88%;
            object-fit: contain;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,.35));
          }

          #${targetId} .head-item span,
          #${targetId} .left-item span {
            text-align: center;
            line-height: 1.1;
            font-size: clamp(11px, 2.2vmin, 22px);
            font-weight: 900;
            word-break: break-word;
          }

          #${targetId} .object {
            animation: popObject .28s ease-out both;
          }

          @keyframes popObject {
            0% {
              opacity: 0;
              transform: scale(.2) rotate(-12deg);
            }

            80% {
              opacity: 1;
              transform: scale(1.15) rotate(4deg);
            }

            100% {
              opacity: 1;
              transform: scale(1) rotate(0);
            }
          }

          #${targetId} .sound-btn {
            display: ${config.soundButton ? "flex" : "none"};
            position: absolute;
            right: clamp(8px, 1.4vmin, 16px);
            bottom: clamp(8px, 1.4vmin, 16px);
            width: clamp(32px, 5vmin, 44px);
            height: clamp(32px, 5vmin, 44px);
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,.45);
            border-radius: 50%;
            background: rgba(255,255,255,.08);
            color: ${textColor};
            font-size: clamp(17px, 3vmin, 24px);
            cursor: pointer;
            z-index: 5;
          }

          #${targetId} .win-screen {
            display: none;
            position: absolute;
            z-index: 10;
            inset: 0;
            align-items: center;
            justify-content: center;
            border-radius: 22px;
            padding: 28px;
            text-align: center;
            background: rgba(0,0,0,.82);
            backdrop-filter: blur(6px);
          }

          #${targetId} .win-box {
            max-width: 650px;
          }

          #${targetId} .win-box h2 {
            margin: 0 0 16px;
            color: ${theme};
            font-size: clamp(30px, 6vmin, 62px);
            ${textNeon}
          }

          #${targetId} .win-box img {
            display: block;
            max-width: min(230px, 30vmin);
            max-height: min(230px, 30vmin);
            object-fit: contain;
            margin: 10px auto;
          }

          @media (max-width: 820px) {
            #${targetId} .play-layout {
              grid-template-columns: 1fr;
              grid-template-rows: auto minmax(0, 1fr);
            }

            #${targetId} .found-panel {
              max-height: 105px;
            }

            #${targetId} .found-items {
              display: flex;
              gap: 8px;
              overflow: hidden;
            }

            #${targetId} .found-item {
              width: 58px;
              height: 58px;
              flex: 0 0 58px;
            }

            #${targetId} .board {
              --cell: min(
                66px,
                calc((100vh - 260px) / ${rows + 1}),
                calc((100vw - 60px) / ${cols + 1.4})
              );
            }
          }
        </style>

        <div class="game-main">
          <div class="blur-layer"></div>

          <div class="game-card">
            <div class="start-screen">
              <h1 class="main-title">${safe(config.gameTitle || "МОРСКОЙ БОЙ")}</h1>

              <div class="rules">
                ${String(config.gameRules || "").split("\n").map(function(line) {
                  return `<div>◆ ${safe(line)}</div>`;
                }).join("")}
              </div>

              <button class="game-btn start-btn" type="button">ИГРАТЬ</button>
            </div>

            <div class="play-screen">
              <h2 class="turn-title">ВАШ ХОД</h2>

              <div class="counter">
                Найдено: <span class="found-count">0</span> / ${totalObjects}
              </div>

              <div class="progress">
                <div class="progress-fill"></div>
              </div>

              <div class="team-box">
                <input placeholder="Участник 1">
                <input placeholder="Участник 2">
              </div>

              <div class="play-layout">
                <div class="found-panel">
                  <div class="found-panel-title">НАЙДЕНО</div>
                  <div class="found-items">
                    <div class="found-empty">Здесь будут появляться найденные предметы</div>
                  </div>
                </div>

                <div class="board-wrap">
                  <div class="board">
                    <div class="corner"></div>

                    ${topItems.map(function(item, index) {
                      return makeItem(item, "head-item", index);
                    }).join("")}

                    ${leftItems.map(function(leftItem, rowIndex) {
                      return `
                        ${makeItem(leftItem, "left-item", rowIndex)}
                        ${topItems.map(function(_, colIndex) {
                          return `<button class="cell" type="button" data-row="${rowIndex}" data-col="${colIndex}"></button>`;
                        }).join("")}
                      `;
                    }).join("")}
                  </div>
                </div>
              </div>
            </div>

            <button class="sound-btn" type="button">🔊</button>

            <div class="win-screen">
              <div class="win-box">
                <h2>${safe(config.winText || "Победа!")}</h2>
                ${config.feedbackUrl ? `<img src="${safe(config.feedbackUrl)}" alt="">` : ""}
                ${config.showEndButton ? `<button class="game-btn restart-btn" type="button">${safe(config.endButtonText || "ИГРАТЬ СНОВА")}</button>` : ""}
              </div>
            </div>
          </div>
        </div>
      `;

      const startScreen = root.querySelector(".start-screen");
      const playScreen = root.querySelector(".play-screen");
      const startBtn = root.querySelector(".start-btn");
      const restartBtn = root.querySelector(".restart-btn");
      const soundBtn = root.querySelector(".sound-btn");
      const foundCount = root.querySelector(".found-count");
      const progressFill = root.querySelector(".progress-fill");
      const winScreen = root.querySelector(".win-screen");
      const foundItemsBox = root.querySelector(".found-items");

      function addFoundItem() {
        const empty = foundItemsBox.querySelector(".found-empty");
        if (empty) {
          empty.remove();
        }

        const item = document.createElement("div");
        item.className = "found-item";

        if (config.objectUrl) {
          item.innerHTML = `<img src="${safe(config.objectUrl)}" alt="">`;
        } else {
          item.innerHTML = `<span>★</span>`;
        }

        foundItemsBox.appendChild(item);
      }

      function resetFoundPanel() {
        foundItemsBox.innerHTML = `<div class="found-empty">Здесь будут появляться найденные предметы</div>`;
      }

      function startGame() {
        startScreen.style.display = "none";
        playScreen.style.display = "grid";
      }

      function restartGame() {
        found = 0;
        foundCells.clear();

        root.querySelectorAll(".cell").forEach(function(cell) {
          cell.innerHTML = "";
          cell.classList.remove("active", "vanished", "found");
        });

        root.querySelectorAll(".head-item, .left-item").forEach(function(item) {
          item.classList.remove("active");
        });

        resetFoundPanel();
        foundCount.textContent = "0";
        progressFill.style.width = "0%";
        winScreen.style.display = "none";
        playScreen.style.display = "grid";
      }

      function vanishEmptyCell(cell) {
        if (!cell.classList.contains("found")) {
          cell.classList.add("vanished");
          cell.innerHTML = "";
        }
      }

      startBtn.addEventListener("click", startGame);

      if (previewMode) {
        startGame();
      }

      if (restartBtn) {
        restartBtn.addEventListener("click", restartGame);
      }

      if (soundBtn) {
        soundBtn.addEventListener("click", function() {
          soundOn = !soundOn;
          soundBtn.textContent = soundOn ? "🔊" : "🔇";
        });
      }

      root.querySelectorAll(".cell").forEach(function(cell) {
        cell.addEventListener("click", function() {
          const row = Number(cell.dataset.row);
          const col = Number(cell.dataset.col);
          const key = row + "-" + col;

          playClickSound();

          root.querySelectorAll(".cell, .head-item, .left-item").forEach(function(item) {
            item.classList.remove("active");
          });

          cell.classList.add("active");

          const topItem = root.querySelector('.head-item[data-index="' + col + '"]');
          const leftItem = root.querySelector('.left-item[data-index="' + row + '"]');

          if (topItem) topItem.classList.add("active");
          if (leftItem) leftItem.classList.add("active");

          if (hiddenCells.has(key)) {
            if (!foundCells.has(key)) {
              foundCells.add(key);
              found++;

              cell.classList.remove("vanished");
              cell.classList.add("found");

              if (config.objectUrl) {
                cell.innerHTML = `<img class="object" src="${safe(config.objectUrl)}" alt="">`;
              } else {
                cell.innerHTML = `<span class="object" style="font-size:36px;">★</span>`;
              }

              addFoundItem();

              foundCount.textContent = found;
              progressFill.style.width = Math.round((found / totalObjects) * 100) + "%";

              if (found >= totalObjects) {
                setTimeout(function() {
                  playWinSound();
                  winScreen.style.display = "flex";
                }, 450);
              }
            }
          } else {
            vanishEmptyCell(cell);
          }
        });
      });
    }
  </script>
</body>
</html>
